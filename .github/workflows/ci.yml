name: Selenium E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saucedemo-selenium

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # Sem setup-chrome — WebDriverManager detecta e baixa o driver correto sozinho
      - name: Rodar testes E2E
        run: mvn test --no-transfer-progress

      - name: Publicar relatório TestNG
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes
          path: saucedemo-selenium/target/surefire-reports/
