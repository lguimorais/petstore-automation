$kind: http-request
url: "{{base_url}}/user/{{username}}"
method: DELETE
scripts:
  - type: beforeRequest
    code: pm.expect(pm.environment.get("username")).to.not.be.undefined;
    language: text/javascript
  - type: afterResponse
    code: |-
      
      pm.test("Variáveis do usuário foram limpas", () => {
          pm.environment.unset("user_id");
          pm.environment.unset("username");
          pm.environment.unset("email");
          pm.environment.unset("phone");
          pm.environment.unset("username_original");
          console.log("Variáveis do usuário removidas.");
      });
    language: text/javascript
order: 8000
