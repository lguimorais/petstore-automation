$kind: http-request
url: "{{base_url}}/user/createWithList"
method: POST
body:
  type: json
  content: |-
    [
        {
            "id": {{user_id}},
            "username": "{{username}}",
            "firstName": "Rex",
            "lastName": "Silva",
            "email": "{{email}}",
            "password": "{{password}}",
            "phone": "{{phone}}",
            "userStatus": 1
        }
    ]
scripts:
  - type: afterResponse
    code: |-
      pm.test("Resposta confirma criação da lista de usuários", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });
    language: text/javascript
order: 7000
