$kind: http-request
url: "{{base_url}}/user/login?username={{username}}&password={{password}}"
method: GET
queryParams:
  username: "{{username}}"
  password: "{{password}}"
body:
  type: json
  content: ""
scripts:
  - type: beforeRequest
    code: |-
      pm.expect(pm.environment.get("username")).to.not.be.undefined;
      pm.expect(pm.environment.get("password")).to.not.be.undefined;
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Resposta confirma login com mensagem de sessão", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.include("logged in user session");
      });

      pm.test("Header X-Rate-Limit está presente", () => {
          pm.expect(pm.response.headers.get("X-Rate-Limit")).to.not.be.null;
      });

      pm.test("Header X-Expires-After está presente", () => {
          pm.expect(pm.response.headers.get("X-Expires-After")).to.not.be.null;
      });

      pm.test("Sessão do usuário foi salva", () => {
          const json = pm.response.json();
          const sessao = json.message.split(":")[1];
          pm.environment.set("user_session", sessao);
          console.log(`Sessão salva: ${sessao}`);
          pm.expect(sessao).to.be.a("string");
      });
    language: text/javascript
order: 4000
