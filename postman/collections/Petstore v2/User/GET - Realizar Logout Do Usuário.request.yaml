$kind: http-request
url: "{{base_url}}/user/logout"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Resposta confirma logout", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });

      pm.test("Sessão do usuário foi removida do environment", () => {
          pm.environment.unset("user_session");
          pm.expect(pm.environment.get("user_session")).to.be.undefined;
      });
    language: text/javascript
order: 5000
