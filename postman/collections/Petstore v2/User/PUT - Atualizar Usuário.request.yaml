$kind: http-request
url: "{{base_url}}/user/{{username}}"
method: PUT
body:
  type: json
  content: |-
    {
      "id": {{user_id}},
      "username": "{{username}}",
      "firstName": "Rex",
      "lastName": "Silva",
      "email": "{{email}}",
      "password": "novaSenha123",
      "phone": "{{phone}}",
      "userStatus": 1
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.expect(pm.environment.get("username")).to.not.be.undefined;

      pm.environment.set("username", "rexuser_atualizado");
      pm.environment.set("email", "rex_atualizado@email.com");
      pm.environment.set("phone", "86988888888");
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Resposta confirma atualização do usuário", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });

      pm.test("Variáveis foram atualizadas no environment", () => {
          pm.expect(pm.environment.get("username")).to.eql("rexuser_atualizado");
          pm.expect(pm.environment.get("email")).to.eql("rex_atualizado@email.com");
          pm.expect(pm.environment.get("phone")).to.eql("86988888888");
      });
    language: text/javascript
order: 2000
