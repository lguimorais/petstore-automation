$kind: http-request
name: POST - Criar Pet
url: "{{base_url}}/pet"
method: POST
body:
  type: json
  content: |-
    {
      "id": 13924924,
      "category": {
        "id": 0,
        "name": "string"
      },
      "name": "doggie",
      "photoUrls": [
        "string"
      ],
      "tags": [
        {
          "id": 0,
          "name": "string"
        }
      ],
      "status": "available"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status deve ser 200", () => {
          pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test("Pet criado com ID numérico", () => {
          pm.expect(json.id).to.be.a("number");
      });
      pm.test("Nome correto", () => {
          pm.expect(json.name).to.eql("doggie");
      });
      pm.test("Status do pet é available", () => {
          pm.expect(json.status).to.eql("available");
      });
      pm.collectionVariables.set("petId", json.id);
    language: text/javascript
order: 1776990888878
