$kind: http-request
url: "{{base_url}}/pet/{{pet_id}}/uploadImage"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: additionalMetadata
      value: ""
    - type: file
      key: ImagemPet
      src: postman-cloud:///1f13fe7f-d0b2-4f80-b0fa-56a7804fded6
scripts:
  - type: afterResponse
    code: pm.test("Status 200", () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
