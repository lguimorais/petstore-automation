$kind: http-request
url: "{{base_url}}/pet/{{pet_id}}/uploadImage"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: additionalMetadata
      value: string
    - type: file
      key: file
      src:
        - postman-cloud:///1f143fcd-56b3-4ab0-aacd-bc44a5faf0db
      description: Imagem do Pet
scripts:
  - type: afterResponse
    code: |
      

      pm.test("Resposta confirma upload", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
          pm.expect(json.message).to.include("File uploaded");
      });
    language: text/javascript
  - type: beforeRequest
    code: pm.expect(pm.environment.get("pet_id")).to.not.be.undefined;
    language: text/javascript
order: 3000
