$kind: http-request
url: "{{base_url}}/pet"
method: PUT
body:
  type: json
  content: |-
    {
      "id": 4841,
      "category": {
        "id": 0,
        "name": "string"
      },
      "name": "{{nome_pet}}",
      "photoUrls": [
        "string"
      ],
      "tags": [
        {
          "id": 0,
          "name": "string"
        }
      ],
      "status": "{{status_pet}}"
    }
scripts:
  - type: afterResponse
    code: |
      

      pm.test("Nome foi atualizado", () => {
          const json = pm.response.json();
          pm.expect(json.name).to.eql("Rex Atualizado");
      });

      pm.test("Status foi atualizado", () => {
          const json = pm.response.json();
          pm.expect(json.status).to.eql("pending");
      });
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.environment.set("nome_pet", "Rex Atualizado");
      pm.environment.set("status_pet", "pending");
    language: text/javascript
order: 5000
