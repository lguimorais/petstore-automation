$kind: http-request
url: "{{base_url}}/pet/{{pet_id}}"
method: POST
body:
  type: urlencoded
  content:
    name: "{{nome_pet}}"
    status: available
scripts:
  - type: afterResponse
    code: |
      
      pm.test("Resposta retornou uma mensagem de confirmação", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });
    language: text/javascript
  - type: beforeRequest
    code: pm.expect(pm.environment.get("pet_id")).to.not.be.undefined;
    language: text/javascript
settings:
  disabledSystemHeaders: []
order: 6000
