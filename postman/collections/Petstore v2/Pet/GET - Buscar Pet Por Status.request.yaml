$kind: http-request
url: "{{base_url}}/pet/findByStatus?status={{status_pet}}"
method: GET
queryParams:
  status: "{{status_pet}}"
scripts:
  - type: afterResponse
    code: |
      

      pm.test("Resposta é uma lista", () => {
          const json = pm.response.json();
          pm.expect(json).to.be.an("array");
      });

      pm.test("Todos os pets têm status available", () => {
          const json = pm.response.json();
          json.forEach(pet => {
              pm.expect(pet.status).to.eql("available");
          });
      });
    language: text/javascript
  - type: beforeRequest
    code: pm.environment.set("status_pet", "available");
    language: text/javascript
order: 4000
