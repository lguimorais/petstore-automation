$kind: http-request
url: "{{base_url}}/pet/{{pet_id}}"
method: DELETE
scripts:
  - type: afterResponse
    code: |+
      
      pm.test("Pet foi deletado com sucesso", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });

      // Limpa a variável após deletar
      pm.environment.unset("pet_id");

    language: text/javascript
  - type: beforeRequest
    code: pm.expect(pm.environment.get("pet_id")).to.not.be.undefined;
    language: text/javascript
order: 7000
