$kind: http-request
url: "{{base_url}}/store/order/{{order_id}}"
method: DELETE
scripts:
  - type: afterResponse
    code: |-
      
      pm.test("Resposta confirma que o pedido foi removido", () => {
          const json = pm.response.json();
          pm.expect(json.message).to.be.a("string");
      });


      pm.environment.unset("order_id");
    language: text/javascript
  - type: beforeRequest
    code: |-
      const orderId = pm.environment.get("order_id");

      if (!orderId || orderId <= 0) {
          console.warn("Nenhum order_id válido encontrado para deletar.");
      } else {
          console.log(`Deletando pedido de ID: ${orderId}`);
      }
    language: text/javascript
order: 4000
