$kind: http-request
url: "{{base_url}}/store/order/{{order_id}}"
method: GET
scripts:
  - type: afterResponse
    code: |+
      
      pm.test("Resposta está em formato JSON válido", () => {
          pm.response.to.be.json;
      });

      pm.test("ID do pedido retornado está correto", () => {
          const json = pm.response.json();
          pm.expect(json.id).to.eql(Number(pm.environment.get("order_id")));
      });

      pm.test("Status do pedido é um valor válido", () => {
          const json = pm.response.json();
          const statusValidos = ["placed", "approved", "delivered"];
          pm.expect(statusValidos).to.include(json.status);
      });

      pm.test("Quantidade do pedido é um número", () => {
          const json = pm.response.json();
          pm.expect(json.quantity).to.be.a("number");
      });

      pm.test("Campo 'complete' é um booleano", () => {
          const json = pm.response.json();
          pm.expect(json.complete).to.be.a("boolean");
      });

    language: text/javascript
  - type: beforeRequest
    code: |-
      const orderId = pm.environment.get("order_id");

      if (!orderId || orderId < 1 || orderId > 10) {
          pm.environment.set("order_id", 5);
          console.warn("order_id inválido ou fora do intervalo — usando valor padrão: 5");
      } else {
          console.log(`Buscando pedido de ID: ${orderId}`);
      }
    language: text/javascript
order: 2000
